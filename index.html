<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#FFF5D6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Duet Dogs — a ScoutPaw rhythm game. Catch treats on the beat with the pack!" />
  <title>Duet Dogs — ScoutPaw Rhythm Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>
    <div id="ui"></div>
    <div id="hud" class="hidden" aria-hidden="true">
      <button id="btn-pause" class="hud-btn" aria-label="Pause" title="Pause (Esc)">⏸</button>
      <button id="btn-restart" class="hud-btn" aria-label="Restart" title="Restart">↻</button>
    </div>
    <div id="pause" class="hidden" aria-hidden="true">
      <div class="pause-card">
        <h2>Paused</h2>
        <button class="btn primary" id="btn-resume">▶ Resume</button>
        <button class="btn ghost" id="btn-restart-pause">↻ Restart</button>
        <button class="btn ghost" id="btn-quit">Menu</button>
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
